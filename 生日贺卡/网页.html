<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎂 生日贺卡 - 给呸呸</title>
  <style>
    :root {
      --card-width: 320px;
      --card-height: 430px;
      --flip-duration: 0.85s;
      --pearl-white: #fdfaf5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(160deg, #fff7f2 0%, #fef0e8 25%, #fce8dc 50%, #fef3eb 75%, #fff9f5 100%);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* ============ 背景装饰粒子 ============ */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    .particle:nth-child(1) { left: 10%; width: 8px; height: 8px; background: #ffb3ba; animation-duration: 12s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; width: 6px; height: 6px; background: #ffdfba; animation-duration: 14s; animation-delay: 1.5s; }
    .particle:nth-child(3) { left: 40%; width: 10px; height: 10px; background: #ffffba; animation-duration: 11s; animation-delay: 3s; }
    .particle:nth-child(4) { left: 55%; width: 5px; height: 5px; background: #bae1ff; animation-duration: 15s; animation-delay: 0.8s; }
    .particle:nth-child(5) { left: 70%; width: 9px; height: 9px; background: #ffb3ba; animation-duration: 13s; animation-delay: 2.2s; }
    .particle:nth-child(6) { left: 85%; width: 7px; height: 7px; background: #e8baff; animation-duration: 16s; animation-delay: 4s; }
    .particle:nth-child(7) { left: 15%; width: 6px; height: 6px; background: #baffc9; animation-duration: 10s; animation-delay: 5s; }
    .particle:nth-child(8) { left: 50%; width: 8px; height: 8px; background: #ffdfba; animation-duration: 13.5s; animation-delay: 3.5s; }
    .particle:nth-child(9) { left: 78%; width: 5px; height: 5px; background: #ffb3ba; animation-duration: 14.5s; animation-delay: 1.2s; }
    .particle:nth-child(10) { left: 32%; width: 7px; height: 7px; background: #bae1ff; animation-duration: 12.5s; animation-delay: 6s; }
    .particle:nth-child(11) { left: 62%; width: 4px; height: 4px; background: #ffffba; animation-duration: 9s; animation-delay: 2.8s; }
    .particle:nth-child(12) { left: 90%; width: 6px; height: 6px; background: #e8baff; animation-duration: 11.5s; animation-delay: 4.5s; }

    @keyframes floatUp {
      0% { transform: translateY(105vh) rotate(0deg) scale(0); opacity: 0; }
      8% { opacity: 0.85; transform: translateY(88vh) rotate(30deg) scale(1); }
      60% { opacity: 0.7; }
      95% { opacity: 0.15; }
      100% { transform: translateY(-15vh) rotate(200deg) scale(0.4); opacity: 0; }
    }

    /* ============ 主场景 ============ */
    .scene {
      position: relative;
      z-index: 1;
      perspective: 1000px;
      -webkit-perspective: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ============ 卡片容器 ============ */
    .card-wrapper {
      width: var(--card-width);
      height: var(--card-height);
      cursor: pointer;
      position: relative;
      transition: transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .card-wrapper:active {
      transform: scale(0.97);
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform var(--flip-duration) cubic-bezier(0.4, 0.0, 0.2, 1);
      will-change: transform;
    }
    .card.flipped {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }

    /* ============ 卡片面 - 通用 ============ */
    .card-face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(180, 120, 80, 0.18), 0 2px 8px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
    }

    /* ============ 正面 - 生日贺图 ============ */
    .card-front {
      background: linear-gradient(170deg, #fff5f5 0%, #ffe8e0 15%, #ffd4c8 30%, #ffe0d4 50%, #fff0e8 70%, #fffaf7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .card-front::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -50px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(255,200,150,0.35) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .card-front::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -30px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(255,180,180,0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .front-content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* 贺图展示 —— 文件名改为“贺图.jpeg” */
    .custom-artwork {
      width: 88%;
      max-width: 280px;
      height: auto;
      border-radius: 12px;
      animation: gentleFloat 3.5s ease-in-out infinite;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    @keyframes gentleFloat {
      0%,100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
      60% { transform: translateY(-3px); }
      80% { transform: translateY(-6px); }
    }

    /* 正面底部文字 */
    .front-label {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      color: #c4876b;
      letter-spacing: 0.5px;
      animation: pulseHint 2s ease-in-out infinite;
      pointer-events: none;
    }
    .front-label .tap-icon {
      display: inline-block;
      width: 22px;
      height: 22px;
      animation: tapBounce 1.2s ease-in-out infinite;
    }
    @keyframes pulseHint {
      0%,100% { opacity:0.65; }
      50% { opacity:1; }
    }
    @keyframes tapBounce {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(-5px) rotate(-8deg); }
      60% { transform: translateY(0) rotate(5deg); }
      80% { transform: translateY(-2px) rotate(-3deg); }
    }

    /* ============ 背面 - 珍珠白明信片 ============ */
    .card-back {
      background: var(--pearl-white);
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: relative;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180,160,140,0.015) 2px, rgba(180,160,140,0.015) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(170,150,130,0.01) 3px, rgba(170,150,130,0.01) 6px);
      background-color: var(--pearl-white);
    }

    .postcard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 20px 10px 20px;
      flex-shrink: 0;
    }
    .postcard-title {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: #b8a590;
      text-transform: uppercase;
      font-weight: 500;
    }
    .stamp-wrapper { position: relative; flex-shrink: 0; }
    .stamp {
      width: 52px;
      height: 62px;
      background: #fff;
      border: 2.5px dashed #d5c8b5;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
      box-shadow: 1px 2px 6px rgba(0,0,0,0.07);
      transform: rotate(3deg);
    }
    .stamp-inner {
      width: 100%;
      height: 100%;
      background: linear-gradient(150deg, #ffe8e0 0%, #ffd4c4 40%, #ffc8b8 100%);
      border-radius: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .stamp-flower { text-align: center; line-height: 1; }
    .stamp-flower .petals { font-size: 18px; display: block; animation: stampSway 4s ease-in-out infinite; }
    .stamp-flower .stem { font-size: 10px; display: block; margin-top: -2px; }
    @keyframes stampSway {
      0%,100%{ transform:rotate(0deg); }
      25%{ transform:rotate(5deg); }
      75%{ transform:rotate(-4deg); }
    }
    .stamp-denomination {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 8px;
      color: #a08070;
      font-weight: 600;
    }
    .postmark {
      position: absolute;
      top: 10px;
      right: -8px;
      width: 44px;
      height: 44px;
      border: 2px solid rgba(160,130,110,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-10deg);
      pointer-events: none;
    }
    .postmark-text {
      font-size: 7px;
      color: rgba(150,120,100,0.5);
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.5px;
      transform: rotate(5deg);
    }
    .postcard-divider {
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, #d5c8b5 8%, #d5c8b5 92%, transparent 100%);
      position: absolute;
      top: 0;
      bottom: 0;
      left: 57%;
      flex-shrink: 0;
    }
    .postcard-body {
      display: flex;
      flex: 1;
      position: relative;
      padding: 6px 20px 16px 20px;
      min-height: 0;
    }
    .message-area {
      flex: 0 0 55%;
      padding-right: 16px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      overflow-y: auto;
    }
    .message-text {
      font-family: 'STKaiti', 'KaiTi', '楷体', 'Noto Serif SC', 'SimSun', '宋体', serif;
      font-size: 13.5px;
      line-height: 1.9;
      color: #4a3728;
      letter-spacing: 0.3px;
      word-break: break-word;
      min-height: 60px;
    }
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #c4876b;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blinkCursor 0.55s step-end infinite;
    }
    .typing-cursor.finished {
      animation: blinkCursorSlow 1.2s step-end infinite;
      background: #c9a992;
    }
    @keyframes blinkCursor {
      0%,100%{ opacity:1; }
      50%{ opacity:0; }
    }
    @keyframes blinkCursorSlow {
      0%,100%{ opacity:0.55; }
      50%{ opacity:0; }
    }

    .address-area {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      padding-left: 10px;
      padding-top: 8px;
      z-index: 1;
    }
    .address-lines {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 6px;
    }
    .address-line {
      height: 1px;
      background: #d5c8b5;
      width: 100%;
      position: relative;
    }
    .zip-code-box {
      margin-top: auto;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-bottom: 4px;
    }
    .zip-slot {
      width: 22px;
      height: 28px;
      border: 1.5px solid #d5c8b5;
      border-radius: 3px;
      background: rgba(255,255,255,0.5);
    }
    .postcard-footer {
      padding: 0 20px 14px 20px;
      font-size: 9px;
      color: #c4b5a3;
      letter-spacing: 1px;
      text-align: right;
      flex-shrink: 0;
    }

    .back-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #c4b5a3;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.6s ease 1.5s;
      pointer-events: none;
      z-index: 3;
    }
    .card.flipped .back-hint {
      opacity: 0.7;
    }

    .scene-hint {
      font-size: 13px;
      color: #c4a38a;
      letter-spacing: 1px;
      text-align: center;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    @media (max-width: 380px) {
      :root { --card-width: 280px; --card-height: 380px; }
      .message-text { font-size: 12px; line-height: 1.8; }
      .stamp { width: 44px; height: 52px; }
    }
    @media (min-width: 500px) {
      :root { --card-width: 360px; --card-height: 480px; }
      .message-text { font-size: 15px; line-height: 2.0; }
    }

    .card-wrapper.entrance {
      animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes popIn {
      0% { transform: scale(0.75); opacity: 0; }
      60% { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
<!-- 背景粒子 -->
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>

<!-- 音乐播放器：循环播放 Confetti.m4a -->
<audio id="bgMusic" loop preload="auto">
  <source src="Confetti.m4a" type="audio/mp4">
  您的浏览器不支持音频播放。
</audio>

<!-- 主场景 -->
<div class="scene" id="scene">
  <div class="card-wrapper entrance" id="cardWrapper" title="点击翻转贺卡">
    <div class="card" id="card">
      <!-- 正面：生日贺图（扩展名 .jpeg，文字改为 PUP） -->
      <div class="card-face card-front">
        <div class="front-content">
          <img class="custom-artwork" src="贺图.jpeg" alt="生日贺图 - Happy Birthday PUP">
        </div>
        <div class="front-label">
          <span class="tap-icon">👆</span>
          <span>点击翻转</span>
        </div>
      </div>

      <!-- 背面：珍珠白明信片 -->
      <div class="card-face card-back" id="cardBack">
        <div class="postcard-header">
          <span class="postcard-title">POSTCARD</span>
          <div class="stamp-wrapper">
            <div class="stamp">
              <div class="stamp-inner">
                <div class="stamp-flower">
                  <span class="petals">🌸</span>
                  <span class="stem">🌿</span>
                </div>
              </div>
              <span class="stamp-denomination">19¢</span>
            </div>
            <div class="postmark">
              <span class="postmark-text">2026<br>MAY<br>★</span>
            </div>
          </div>
        </div>
        <div class="postcard-divider"></div>
        <div class="postcard-body">
          <div class="message-area">
            <div class="message-text" id="messageText"></div>
          </div>
          <div class="address-area">
            <div class="address-lines">
              <div class="address-line"></div><div class="address-line"></div><div class="address-line"></div>
            </div>
            <div class="zip-code-box">
              <div class="zip-slot"></div><div class="zip-slot"></div><div class="zip-slot"></div>
              <div class="zip-slot"></div><div class="zip-slot"></div><div class="zip-slot"></div>
            </div>
          </div>
        </div>
        <div class="postcard-footer">✉ 致亲爱的呸呸</div>
        <div class="back-hint">再次点击可翻回正面</div>
      </div>
    </div>
  </div>
  <div class="scene-hint" id="sceneHint">👆 点击贺卡翻转查看祝福</div>
</div>

<script>
  (function() {
    // 元素引用
    const cardWrapper = document.getElementById('cardWrapper');
    const card = document.getElementById('card');
    const messageText = document.getElementById('messageText');
    const sceneHint = document.getElementById('sceneHint');
    const bgMusic = document.getElementById('bgMusic');

    let isFlipped = false;
    let isTyping = false;
    let typingTimer = null;
    let currentCharIndex = 0;
    let isTransitioning = false;
    let musicStarted = false;

    // 祝福文本（保持不变）
    const blessingLines = [
      '亲爱的呸呸，19岁生日快乐。',
      '',
      '遇见你，实在是我的幸运。我至今仍觉得欢喜——我们竟成了同班同学，在校园里无数次偶然相遇，又因我在你面前不经意流露出的某一面，让你主动朝我走近。人循着美感的指引，把一连串偶然的事件淬炼成一个主题，然后郑重地记入生命的乐章之中。你我的相遇，恰似这般——一件事若需仰赖一连串的偶然才能发生，岂不恰恰说明了它的非同寻常与意味深长？',
      '',
      '然而从理性的角度我又懂得，是我们大致相近的素质，决定了我们来到同一所学校；而同一专业的排课，自然有它极高的重合度。我们的相遇之中，早已藏着必然。尼采说，爱命运就是在偶然中认出那份"es muss sein"，然后对它说"es muss sein"。我在社交场合习惯戴上的面具，与你那随和又可爱的个性相逢，彼此的靠近，何尝不是一声柔软而肯定的"es muss sein"。',
      '',
      '无论是偶然还是必然，我都绝不会以为，这自然而然发生、日日被我期盼和得到的一切，是悄无声息、不值一提的。认识你之前，我对于与人交流、建立深度联结这件事，毫无感觉，更无信心。我几乎没有称得上朋友的人。而你的靠近，让我清楚地看见了自己从前的狭隘与无知。我需要、也无比渴望一段纯粹而真挚的情感，哪怕我不够优秀，性格不够好，内心也远不够强大。',
      '',
      '你可能不知道的是，在你刚刚开始接近我的那段日子，我正处于情绪的最低谷。我反复经历失眠、暴食，承受着躯体化的折磨，同时又因为某种"不相信希望"的思维惯性，没有做出任何自救的尝试。是你主动的靠近，给了我来自外部的积极反馈。也许在你眼里，那不过是待人接物的常态，但它对我而言，却意义非凡。它让我隐隐觉得，自己或许没有那么糟糕，或许真的有人是会喜欢我的。就凭着这一点点光亮般珍贵的希望，我把自己带去了医院，开始重新尝试站起来。如今我仍未能彻底摆脱痛苦的阴影，但我已不再放任自己一味顾影自怜——我正在越过痛苦，一步一步地向你，也向自己走来。',
      '',
      '而走到你近旁之后，我才渐渐发现，你的灵魂比我想象的更加丰饶有趣。你是那么乐观、善良，富于同情心，又由衷地热爱着这个世界。相处当中，你给我的几乎全是温柔的、正向的回响。与此同时，我也暗暗担心：你是否在我面前，有意压抑了自己的负面感受呢？',
      '',
      '也正因为如此，我才渐渐看得见你藏起来的那些东西——焦虑、孤独、对未来的不确定感，像一个走钢丝的人，在细如发丝的平衡木上小心翼翼地挪步。年少时我们只看见深渊在远处，长大后才发现钢丝就在脚下，呼吸稍微重一点都可能失衡。理解了，才开始担心；看清楚了，却发现自己已经害怕了太久，久到累得不想再怕。可你的神经偏偏那么柔软、那么发达，几乎暴露在外，这个世界的每一丝风吹草动都会震颤你。然而，恰恰是这些让你焦虑的东西，也让你比任何人都更敏锐地感知到美与善——像一面高度敏感的感光板，因此才捕捉得到那些被旁人轻易错过的光影。这份柔软是你的天赋，也是你的负担，但它绝不是弱点。',
      '',
      '我将在未来无数次放任自己，潜入我们共同的那条金色梦河——其中满载着所有我们珍重的往昔。河水会映出那些欢愉时光，它们将化作养料，滋养我继续成长，成为我越过痛苦的恒久力量。真的非常感谢你，把这些力量慷慨地赠予了我。',
      '',
      '我也希望，在未来的相处里，我们能够变得更加坦诚，更加亲密。让我能够悲你所悲，乐你所乐，支持你所做出的每一个选择。让我也能替你分担痛苦，成为替你托住那些不必独自吞咽的难过的人。',
      '',
      '我希望你能永远记得，所谓"可观不可得"的幸福，其实一直在你身边。幸福从来不是远方高悬的奖赏，它就藏在你如此认真生活的每一个片刻里。愿你永远幸福，身体健康。走钢丝的时候不用害怕，掉下去也不丢人——钢丝下面不是深渊，是托得住你的、漫长而辽阔的人生。',
      '',
      '已经看得很深的你，也一定会走得很远。',
      '',
      '十九岁快乐，我亲爱的呸呸。'
    ];

    const fullBlessing = blessingLines.join('\n');

    // 尝试播放音乐
    function tryPlayMusic() {
      if (!musicStarted && bgMusic) {
        bgMusic.play().then(() => {
          musicStarted = true;
          console.log('🎵 音乐开始循环播放');
        }).catch(err => {
          console.warn('音乐自动播放被阻止，将在用户交互后重试:', err.message);
        });
      }
    }

    // 入场粒子
    function spawnBurstParticles(x, y) {
      const container = document.createElement('div');
      container.className = 'burst-particles';
      container.style.cssText = `position:fixed; pointer-events:none; z-index:10; left:${x}px; top:${y}px;`;
      document.body.appendChild(container);
      const colors = ['#ffb3ba','#ffdfba','#ffffba','#bae1ff','#e8baff','#ffcc80'];
      for (let i=0; i<14; i++) {
        const dot = document.createElement('div');
        const size = 3+Math.random()*6;
        const angle = (Math.PI*2/14)*i + (Math.random()-0.5)*0.6;
        const dist = 28+Math.random()*45;
        const bx = Math.cos(angle)*dist;
        const by = Math.sin(angle)*dist;
        dot.style.cssText = `position:absolute; width:${size}px; height:${size}px; background:${colors[Math.floor(Math.random()*colors.length)]}; border-radius:50%; animation:burstOut ${0.5+Math.random()*0.6}s ease-out forwards; --bx:${bx}px; --by:${by}px;`;
        container.appendChild(dot);
      }
      setTimeout(() => container.remove(), 1200);
    }
    const burstStyle = document.createElement('style');
    burstStyle.textContent = `@keyframes burstOut { 0%{ transform:translate(0,0) scale(1); opacity:1; } 100%{ transform:translate(var(--bx),var(--by)) scale(0); opacity:0; } }`;
    document.head.appendChild(burstStyle);

    // 打字机效果
    function startTyping() {
      if (isTyping) return;
      isTyping = true;
      currentCharIndex = 0;
      messageText.innerHTML = '';
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'typing-cursor';
      cursorSpan.id = 'typingCursor';
      messageText.appendChild(cursorSpan);

      const baseSpeed = 45;
      function typeNextChar() {
        const cursor = document.getElementById('typingCursor');
        if (!cursor) return;
        if (currentCharIndex >= fullBlessing.length) {
          cursor.classList.add('finished');
          isTyping = false;
          return;
        }
        const char = fullBlessing[currentCharIndex];
        if (char === '\n') {
          const br = document.createElement('br');
          messageText.insertBefore(br, cursor);
        } else {
          const textNode = document.createTextNode(char);
          messageText.insertBefore(textNode, cursor);
        }
        currentCharIndex++;
        typingTimer = setTimeout(typeNextChar, baseSpeed + (Math.random()-0.5)*25);
      }
      setTimeout(typeNextChar, 300);
    }

    function stopTyping() {
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      isTyping = false;
    }

    function resetTypingArea() {
      stopTyping();
      messageText.innerHTML = '';
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'typing-cursor';
      cursorSpan.id = 'typingCursor';
      messageText.appendChild(cursorSpan);
      currentCharIndex = 0;
    }

    // 翻转
    function flipCard() {
      if (isTransitioning) return;
      isTransitioning = true;
      tryPlayMusic();

      if (isFlipped) {
        card.classList.remove('flipped');
        isFlipped = false;
        stopTyping();
        sceneHint.textContent = '👆 点击贺卡翻转查看祝福';
        sceneHint.style.opacity = '1';
        setTimeout(resetTypingArea, 400);
      } else {
        card.classList.add('flipped');
        isFlipped = true;
        sceneHint.textContent = '📬 明信片背面 · 祝福正在书写…';
        sceneHint.style.opacity = '0.85';
        setTimeout(() => {
          resetTypingArea();
          startTyping();
        }, 500);
      }

      const rect = cardWrapper.getBoundingClientRect();
      spawnBurstParticles(rect.left + rect.width/2, rect.top + rect.height/2);
      setTimeout(() => { isTransitioning = false; }, 900);
    }

    // 事件
    cardWrapper.addEventListener('click', e => { e.preventDefault(); flipCard(); });
    cardWrapper.addEventListener('touchstart', e => { cardWrapper.style.transform = 'scale(0.97)'; }, {passive: true});
    cardWrapper.addEventListener('touchend', e => { cardWrapper.style.transform = ''; }, {passive: true});
    cardWrapper.addEventListener('touchcancel', e => { cardWrapper.style.transform = ''; }, {passive: true});
    cardWrapper.setAttribute('tabindex','0');
    cardWrapper.setAttribute('role','button');
    cardWrapper.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); flipCard(); } });

    card.addEventListener('transitionend', e => {
      if (e.propertyName === 'transform' && isFlipped && !isTyping && currentCharIndex===0) {
        resetTypingArea();
        startTyping();
      }
    });

    // 初始化
    function init() {
      setTimeout(() => cardWrapper.classList.remove('entrance'), 800);
      resetTypingArea();
      console.log('🎂 生日贺卡已就绪！');
      console.log('📷 贺图文件：贺图.jpeg（确认扩展名为 .jpeg）');
      console.log('🎵 音乐文件：Confetti.m4a');
    }
    init();
  })();
</script>
</body>
</html>
